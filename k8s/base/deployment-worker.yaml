apiVersion: apps/v1
kind: Deployment
metadata:
  name: geotrack-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: geotrack-worker
  template:
    metadata:
      labels:
        app: geotrack-worker
    spec:
      terminationGracePeriodSeconds: 45 # Give it 45s to flush DB buffers
      containers:
        - name: application
          image: geotrack:v1.0.0
          resources:
            # Guaranteed QoS class: limits == requests
            # Prevents CPU throttling anomalies during sudden incoming spikes
            requests:
              cpu: "1000m"
              memory: "2048Mi"
            limits:
              cpu: "1000m"
              memory: "2048Mi"
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
