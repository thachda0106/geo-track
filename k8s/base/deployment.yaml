apiVersion: apps/v1
kind: Deployment
metadata:
  name: geotrack-api
  namespace: geotrack
  labels:
    app.kubernetes.io/name: geotrack-api
    app.kubernetes.io/component: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0    # Zero-downtime deploys
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: geotrack-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: geotrack-api
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: geotrack
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: geotrack-api:latest
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: geotrack-config
            - secretRef:
                name: geotrack-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12    # 60s max startup time
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geotrack-worker
  namespace: geotrack
  labels:
    app.kubernetes.io/name: geotrack-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 1    # Single instance — outbox relay must not run in parallel
  strategy:
    type: Recreate    # Kill old before starting new (no parallel relays)
  selector:
    matchLabels:
      app.kubernetes.io/name: geotrack-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: geotrack-worker
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: geotrack
      terminationGracePeriodSeconds: 30
      containers:
        - name: worker
          image: geotrack-worker:latest
          envFrom:
            - configMapRef:
                name: geotrack-config
            - secretRef:
                name: geotrack-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
