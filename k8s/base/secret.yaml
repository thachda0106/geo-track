# ⚠️ WARNING: This is a TEMPLATE. In production, use sealed-secrets or external-secrets.
# Replace placeholder values before deploying.
apiVersion: v1
kind: Secret
metadata:
  name: geotrack-secrets
  namespace: geotrack
type: Opaque
stringData:
  DATABASE_URL: "postgresql://geotrack:CHANGE_ME@pgbouncer:6432/geotrack?pgbouncer=true"
  DIRECT_URL: "postgresql://geotrack:CHANGE_ME@postgres:5432/geotrack"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  KAFKA_BROKERS: "redpanda:9092"
  JWT_SECRET: "CHANGE_ME_TO_A_SECURE_SECRET_MINIMUM_32_CHARS"
  JWT_ACCESS_EXPIRATION: "15m"
  JWT_REFRESH_EXPIRATION: "7d"
